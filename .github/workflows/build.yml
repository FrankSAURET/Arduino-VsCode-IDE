name: CI

on:
  push:
    branches:
      - main
    tags:
      - v*
  pull_request:
    branches:
      - main

permissions:
  contents: read

jobs:
  build:
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ ubuntu-latest, macos-latest, windows-latest ]

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Use Node 22.x
        uses: actions/setup-node@v6
        with:
          node-version: 22.x

      - name: Install project dependencies
        run: npm install --ignore-scripts

      - name: Check for linting errors
        run: npm run lint

      - name: Build extension
        run: npm run build:ext
        env:
          NODE_OPTIONS: --openssl-legacy-provider

      - name: Pack extension
        run: |
          npm pkg delete scripts.vscode:prepublish
          npx @vscode/vsce package --no-dependencies --out arduino-vscode-ide.vsix

      - name: Publish extension VSIX as artifact
        uses: actions/upload-artifact@v7
        with:
          name: VS Code extension VSIX (${{ matrix.os }})
          path: arduino-vscode-ide.vsix
